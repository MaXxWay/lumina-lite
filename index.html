<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Lumina Lite</title>
    <link rel="icon" type="image/svg+xml" href="lumina.svg">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <!-- Регистрация -->
    <div id="step-register" class="auth-container">
        <div class="background-logo">
            <h1 class="logo-text">Lumina<span class="logo-badge">Lite</span></h1>
            <p class="logo-sub">Приватный мессенджер нового поколения</p>
        </div>
        <div class="glass-card">
            <h2 class="auth-title">Создать профиль</h2>
            <input type="text" id="reg-fullname" class="glass-input" placeholder="Ваше имя">
            <input type="text" id="reg-username" class="glass-input" placeholder="Username (английский)">
            <input type="password" id="reg-password" class="glass-input" placeholder="Пароль">
            <button id="btn-register" class="glass-button primary">Начать общение</button>
            <button id="btn-go-to-login" class="glass-button secondary">Уже есть аккаунт? Войти</button>
        </div>
    </div>

    <!-- Вход -->
    <div id="step-login" class="auth-container">
        <div class="background-logo">
            <h1 class="logo-text">Lumina<span class="logo-badge">Lite</span></h1>
        </div>
        <div class="glass-card">
            <h2 class="auth-title">С возвращением</h2>
            <input type="text" id="login-username" class="glass-input" placeholder="Username">
            <input type="password" id="login-password" class="glass-input" placeholder="Пароль">
            <button id="btn-login" class="glass-button primary">Войти в сеть</button>
            <button id="btn-go-to-register" class="glass-button secondary">Создать новый аккаунт</button>
        </div>
    </div>

    <!-- Основной интерфейс чата -->
    <div id="chat" class="glass-main-container">
        <aside class="dialogs-sidebar">
            <div class="sidebar-header">
                <span class="logo-small">Lumina</span>
                <div class="current-user-info" id="btn-open-profile" style="cursor: pointer;">
                    <span id="current-user-badge">Загрузка...</span>
                </div>
            </div>
            <div class="dialogs-list" id="dialogs-list"></div>
        </aside>

        <main class="glass-chat-area">
            <header class="chat-header">
                <div class="chat-info">
                    <h3 id="chat-title">Lumina Lite</h3>
                    <span class="chat-status" id="chat-status">выберите диалог</span>
                </div>
            </header>

            <div class="messages-container" id="messages">
                <div class="msg-stub">
                    <p>Выберите диалог, чтобы начать общение</p>
                </div>
            </div>

            <div class="input-zone" id="input-zone" style="display: none;">
                <div class="glass-input-wrapper">
                    <input type="text" id="message-input" class="message-input" placeholder="Напишите сообщение...">
                    <button id="btn-send" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
                        </svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <!-- Модальное окно профиля -->
    <div id="profile-modal" class="profile-screen">
        <div class="profile-modal-content glass-card">
            <div class="profile-modal-header" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h3 style="margin:0">Профиль</h3>
                <button id="btn-close-profile" style="background:none; border:none; color:white; font-size:24px; cursor:pointer; line-height:1;">&times;</button>
            </div>

            <div style="text-align:center; margin-bottom:20px;">
                <div id="profile-avatar-letter" style="width:80px; height:80px; background: linear-gradient(135deg, var(--accent-blue), var(--accent-cyan)); border-radius:50%; display:inline-flex; align-items:center; justify-content:center; font-size:32px; font-weight:bold;">?</div>
            </div>

            <label class="profile-label">Имя</label>
            <input type="text" id="profile-fullname" class="glass-input">

            <label class="profile-label">О себе</label>
            <textarea id="profile-bio" class="glass-input" rows="3" style="resize:none;"></textarea>

            <button id="btn-save-profile" class="glass-button primary" style="margin-top:10px;">Сохранить</button>
            <button id="btn-logout-profile" class="glass-button" style="width:100%; margin-top:10px; padding:14px; border-radius:var(--radius-input); background:rgba(255,71,87,0.15); color:#ff4757; border:1px solid rgba(255,71,87,0.3); font-weight:700; font-size:16px; cursor:pointer; transition:var(--transition);">Выйти</button>
        </div>
    </div>

    <!-- Тост-уведомления -->
    <div id="toast" class="toast"></div>

    <script type="module" src="main.js"></script>
</body>
</html>
