<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Lite</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div id="auth-container" class="liquid-glass">
        <h1>Lumina</h1>
        <input type="email" id="email" class="glass-input" placeholder="Email">
        <input type="password" id="password" class="glass-input" placeholder="Пароль">
        <button id="login-btn" class="glass-button">Войти / Регистрация</button>
    </div>

    <div id="chat-container" class="liquid-glass">
        <div id="messages" class="messages-area"></div>
        <form id="message-form">
            <input type="text" id="message-input" class="glass-input" placeholder="Сообщение..." autocomplete="off">
            <button type="submit" class="glass-button" style="width: 60px;">🚀</button>
        </form>
    </div>
    <script src="app.js"></script>
</body>
</html>
