<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina Lite</title>
    <link rel="icon" type="image/svg+xml" href="lumina.svg">
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>

    <div id="step-register" class="auth-container active">
        <div class="glass-card">
            <h2>Создать профиль</h2>
            <input type="text" id="reg-username" class="glass-input" placeholder="@username">
            <input type="text" id="reg-full-name" class="glass-input" placeholder="Ваше Имя">
            <input type="password" id="reg-password" class="glass-input" placeholder="Пароль">
            <button id="btn-do-reg" class="glass-button primary">Создать аккаунт</button>
            <p class="auth-footer">Есть аккаунт? <span class="link-btn" id="to-login">Войти</span></p>
        </div>
    </div>

    <div id="step-login" class="auth-container" style="display: none;">
        <div class="glass-card">
            <h2>Вход</h2>
            <input type="text" id="login-username" class="glass-input" placeholder="@username">
            <input type="password" id="login-password" class="glass-input" placeholder="Пароль">
            <button id="btn-do-login" class="glass-button primary">Войти</button>
            <p class="auth-footer">Нет аккаунта? <span class="link-btn" id="to-register">Регистрация</span></p>
        </div>
    </div>

    <div id="chat-screen" class="chat-layout" style="display: none;">
        <aside class="sidebar-glass">
            <nav class="nav-menu">
                <button class="nav-btn active">💬</button>
            </nav>
            <button class="nav-btn logout-btn" id="btn-logout">⏻</button>
        </aside>
        <main class="glass-chat-area">
            <header class="chat-header">
                <div class="chat-info">
                    <h3>Общий канал</h3>
                    <span class="online-status">● онлайн</span>
                </div>
                <span class="current-user-badge" id="current-user-badge"></span>
            </header>
            <div id="messages" class="messages-container"></div>
            <div class="input-zone">
                <div class="glass-input-wrapper">
                    <input type="text" id="message-input" placeholder="Сообщение..." autocomplete="off">
                    <button id="btn-send-msg" class="send-btn">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <div id="toast" class="toast"></div>
    <script src="app.js"></script>
</body>
</html>
